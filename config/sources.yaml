# Config-driven scraper sources.
#
# The whole point of this file (for the Mindrift "stability against site changes"
# story): when a site tweaks its markup, you fix ONE line here — not the code.
#
# Field maps use FBref's `data-stat` attributes, which are far more stable than
# CSS positions or class names. To find a table's id: open the page, View Source,
# and search for `<table ... id="...">`. Some FBref tables are wrapped in HTML
# comments to deter scrapers — the parser handles that automatically.

defaults:
  user_agent: "WC2026-PredictionBot/1.0 (portfolio project; contact: sarthaksunny23@gmail.com)"
  min_delay_seconds: 3.0
  max_retries: 4
  backoff_base_seconds: 2.0
  timeout_seconds: 30.0
  respect_robots: true

sources:
  # Primary static-HTML source (BeautifulSoup). Wikipedia's robots.txt permits
  # article fetches; tables are clean static HTML. Parser selects tables by a
  # header signature and maps columns by header label (both site-change resilient).
  wikipedia:
    name: Wikipedia
    base_url: "https://en.wikipedia.org"
    min_delay_seconds: 2.0
    respect_robots: true
    # Knockout-bracket scraper reads this article's per-match football-box elements.
    knockout_page: "/wiki/2026_FIFA_World_Cup"
    pages:
      wc2026_group_standings:
        path: "/wiki/2026_FIFA_World_Cup"
        tables:
          - record_type: "team_stats"
            # Any wikitable whose header row contains ALL of these is treated as a
            # group-standings table (12 groups + the third-placed ranking table).
            select_by_headers: ["Pld", "W", "D", "L", "GF", "GA", "Pts"]
            team_column: "Team"        # matched by prefix (real header is "Teamvte")
            fields:                     # our_field: wikitable_header_label
              games: "Pld"
              wins: "W"
              draws: "D"
              losses: "L"
              goals_for: "GF"
              goals_against: "GA"

  # Enrichment + cross-validation source: community FIFA WC2026 dataset (public
  # repo, cited in README). Supplies the pre-tournament Elo/FIFA-rank prior and
  # per-match xG that our own Wikipedia scrape doesn't carry.
  wc2026_dataset:
    name: "FIFA WC2026 Dataset (mominullptr)"
    base_url: "https://raw.githubusercontent.com/mominullptr/FIFA-World-Cup-2026-Dataset/main"
    min_delay_seconds: 1.0
    respect_robots: false   # raw.githubusercontent serves a blanket-deny robots; this is a
                            # public data file we were explicitly pointed to and cite
    teams_file: "/teams.csv"
    matches_file: "/matches_detailed.csv"

  # Dynamic / JS-rendered source (the browser layer). This page's records are built
  # client-side by JavaScript and are ABSENT from the raw HTML — a plain requests.get
  # returns an empty container, so a real rendered browser (Selenium headless Chrome)
  # is genuinely required. Scraped by src/scraper/dynamic_render.py. quotes.toscrape.com
  # is a well-known, robots-permitted scraping sandbox used here purely to demonstrate
  # the JS-rendering capability: the football stats sites that would be more on-theme
  # (FBref, Understat, Sofascore) are each walled by Cloudflare or robots.txt, and
  # scraping them would violate this project's robots-compliant stance.
  dynamic_js:
    name: "Quotes (JS-rendered sandbox)"
    base_url: "https://quotes.toscrape.com"
    path: "/js/"
    max_pages: 3
    min_delay_seconds: 2.0
    respect_robots: true

  # FBref sits behind a Cloudflare bot challenge; plain Selenium returns only a
  # "Just a moment..." page (verified). We do NOT bypass it — anti-bot evasion is
  # against our robots-compliant stance — so it is not fetched. It would instead be
  # reached via an Apify actor (proxy + render). Kept here to document the
  # protected-source case; the pipeline does not fetch it directly.
  fbref:
    name: FBref (protected; would require Apify)
    base_url: "https://fbref.com"
    handled_by: apify
    respect_robots: true
